spring:
  application:
    name: tushu-book-system
  datasource:
    url: jdbc:mysql://localhost:3306/tushu_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

logging:
  level:
    org.springframework.web: DEBUG
    org.hibernate: DEBUG
