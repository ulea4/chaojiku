<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图书管理系统</title>
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/element-plus"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Helvetica Neue', Helvetica, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', Arial, sans-serif;
            background: #f5f7fa;
        }
        
        #app {
            min-height: 100vh;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .container {
            max-width: 1400px;
            margin: 20px auto;
            padding: 0 20px;
        }
        
        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            transition: transform 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
        }
        
        .stat-card h3 {
            color: #667eea;
            font-size: 32px;
            margin-bottom: 8px;
        }
        
        .stat-card p {
            color: #909399;
            font-size: 14px;
        }
        
        .toolbar {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .search-box {
            display: flex;
            gap: 10px;
            flex: 1;
            min-width: 300px;
        }
        
        .data-table {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        
        .pagination {
            margin-top: 20px;
            display: flex;
            justify-content: flex-end;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="header">
            <h1>📚 图书管理系统</h1>
            <p>Library Management System</p>
        </div>
        
        <div class="container">
            <!-- 统计卡片 -->
            <div class="stats-cards">
                <div class="stat-card">
                    <h3>{{ stats.totalBooks }}</h3>
                    <p>图书总数</p>
                </div>
                <div class="stat-card">
                    <h3>{{ stats.availableBooks }}</h3>
                    <p>可借图书</p>
                </div>
                <div class="stat-card">
                    <h3>{{ stats.totalUsers }}</h3>
                    <p>用户总数</p>
                </div>
                <div class="stat-card">
                    <h3>{{ stats.totalBorrows }}</h3>
                    <p>借阅记录</p>
                </div>
            </div>
            
            <!-- 工具栏 -->
            <div class="toolbar">
                <div class="search-box">
                    <el-input 
                        v-model="searchQuery" 
                        placeholder="搜索书名或作者..."
                        clearable
                        @clear="loadBooks">
                        <template #append>
                            <el-button @click="searchBooks" :loading="loading">搜索</el-button>
                        </template>
                    </el-input>
                </div>
                <div style="display: flex; gap: 10px;">
                    <el-button type="success" @click="showUserDialog">
                        👥 用户管理
                    </el-button>
                    <el-button type="warning" @click="showBorrowDialog">
                        📖 借阅管理
                    </el-button>
                    <el-button type="primary" @click="showAddDialog">
                        ➕ 添加图书
                    </el-button>
                </div>
            </div>
            
            <!-- 图书表格 -->
            <div class="data-table">
                <el-table :data="books" stripe style="width: 100%" v-loading="loading">
                    <el-table-column prop="id" label="ID" width="80"></el-table-column>
                    <el-table-column prop="isbn" label="ISBN" width="180"></el-table-column>
                    <el-table-column prop="title" label="书名" min-width="200"></el-table-column>
                    <el-table-column prop="author" label="作者" width="150"></el-table-column>
                    <el-table-column prop="publisher" label="出版社" width="150"></el-table-column>
                    <el-table-column prop="price" label="价格" width="100">
                        <template #default="scope">
                            ¥{{ scope.row.price }}
                        </template>
                    </el-table-column>
                    <el-table-column prop="stockCount" label="库存" width="100">
                        <template #default="scope">
                            <el-tag :type="scope.row.stockCount > 0 ? 'success' : 'danger'">
                                {{ scope.row.stockCount }}
                            </el-tag>
                        </template>
                    </el-table-column>
                    <el-table-column label="操作" width="220" fixed="right">
                        <template #default="scope">
                            <el-button size="small" type="primary" @click="editBook(scope.row)">编辑</el-button>
                            <el-popconfirm
                                title="确定要删除这本书吗？"
                                @confirm="deleteBook(scope.row)">
                                <template #reference>
                                    <el-button size="small" type="danger">删除</el-button>
                                </template>
                            </el-popconfirm>
                        </template>
                    </el-table-column>
                </el-table>
            </div>
            
            <!-- 添加/编辑图书对话框 -->
            <el-dialog 
                v-model="bookDialogVisible" 
                :title="isEdit ? '编辑图书' : '添加图书'"
                width="600px">
                <el-form :model="bookForm" label-width="100px">
                    <el-form-item label="ISBN">
                        <el-input v-model="bookForm.isbn" placeholder="请输入ISBN"></el-input>
                    </el-form-item>
                    <el-form-item label="书名">
                        <el-input v-model="bookForm.title" placeholder="请输入书名"></el-input>
                    </el-form-item>
                    <el-form-item label="作者">
                        <el-input v-model="bookForm.author" placeholder="请输入作者"></el-input>
                    </el-form-item>
                    <el-form-item label="出版社">
                        <el-input v-model="bookForm.publisher" placeholder="请输入出版社"></el-input>
                    </el-form-item>
                    <el-form-item label="价格">
                        <el-input-number v-model="bookForm.price" :min="0" :precision="2"></el-input-number>
                    </el-form-item>
                    <el-form-item label="库存">
                        <el-input-number v-model="bookForm.stockCount" :min="0"></el-input-number>
                    </el-form-item>
                    <el-form-item label="描述">
                        <el-input 
                            v-model="bookForm.description" 
                            type="textarea" 
                            :rows="3"
                            placeholder="请输入描述">
                        </el-input>
                    </el-form-item>
                </el-form>
                <template #footer>
                    <el-button @click="bookDialogVisible = false">取消</el-button>
                    <el-button type="primary" @click="saveBook">保存</el-button>
                </template>
            </el-dialog>
                            
            <!-- 用户管理对话框 -->
            <el-dialog v-model="userDialogVisible" title="用户管理" width="800px">
                <el-table :data="users" stripe>
                    <el-table-column prop="id" label="ID" width="80"></el-table-column>
                    <el-table-column prop="username" label="用户名" width="150"></el-table-column>
                    <el-table-column prop="realName" label="姓名" width="120"></el-table-column>
                    <el-table-column prop="phone" label="电话" width="150"></el-table-column>
                    <el-table-column prop="email" label="邮箱"></el-table-column>
                </el-table>
            </el-dialog>
                            
            <!-- 借阅管理对话框 -->
            <el-dialog v-model="borrowDialogVisible" title="借阅管理" width="900px">
                <el-table :data="borrows" stripe>
                    <el-table-column prop="id" label="ID" width="80"></el-table-column>
                    <el-table-column prop="userId" label="用户ID" width="100"></el-table-column>
                    <el-table-column prop="userName" label="用户" width="120"></el-table-column>
                    <el-table-column prop="bookId" label="图书ID" width="100"></el-table-column>
                    <el-table-column prop="bookTitle" label="图书" width="150"></el-table-column>
                    <el-table-column prop="borrowDate" label="借阅日期" width="180"></el-table-column>
                    <el-table-column prop="status" label="状态" width="100">
                        <template #default="scope">
                            <el-tag :type="scope.row.status === 'BORROWED' ? 'warning' : 'success'">
                                {{ scope.row.status === 'BORROWED' ? '借阅中' : '已归还' }}
                            </el-tag>
                        </template>
                    </el-table-column>
                </el-table>
            </el-dialog>
        </div>
    </div>
    
    <script>
        const { createApp, ref, onMounted } = Vue;
        const API_BASE = 'http://localhost:8081/api';
        
        createApp({
            setup() {
                const books = ref([]);
                const users = ref([]);
                const borrows = ref([]);
                const loading = ref(false);
                const searchQuery = ref('');
                const bookDialogVisible = ref(false);
                const userDialogVisible = ref(false);
                const borrowDialogVisible = ref(false);
                const isEdit = ref(false);
                const stats = ref({
                    totalBooks: 0,
                    availableBooks: 0,
                    totalUsers: 0,
                    totalBorrows: 0
                });
                
                const bookForm = ref({
                    id: null,
                    isbn: '',
                    title: '',
                    author: '',
                    publisher: '',
                    price: 0,
                    stockCount: 0,
                    description: ''
                });
                
                // 加载图书列表
                const loadBooks = async () => {
                    loading.value = true;
                    try {
                        const response = await fetch(`${API_BASE}/books`);
                        books.value = await response.json();
                    } catch (error) {
                        ElementPlus.ElMessage.error('加载图书失败');
                    }
                    loading.value = false;
                };
                
                // 搜索图书
                const searchBooks = async () => {
                    if (!searchQuery.value) {
                        loadBooks();
                        return;
                    }
                    loading.value = true;
                    try {
                        console.log('开始搜索:', searchQuery.value);
                        const url = `${API_BASE}/books/search/title?title=${encodeURIComponent(searchQuery.value)}`;
                        console.log('请求URL:', url);
                        
                        const response = await fetch(url);
                        console.log('响应状态:', response.status);
                        
                        if (!response.ok) {
                            throw new Error(`HTTP error! status: ${response.status}`);
                        }
                        
                        const data = await response.json();
                        console.log('搜索结果:', data);
                        books.value = data;
                        ElementPlus.ElMessage.success(`找到 ${data.length} 本书`);
                    } catch (error) {
                        console.error('搜索错误:', error);
                        ElementPlus.ElMessage.error('搜索失败: ' + error.message);
                        // 搜索失败时重新加载所有图书
                        loadBooks();
                    } finally {
                        loading.value = false;
                    }
                };
                
                // 显示添加对话框
                const showAddDialog = () => {
                    isEdit.value = false;
                    bookForm.value = {
                        id: null,
                        isbn: '',
                        title: '',
                        author: '',
                        publisher: '',
                        price: 0,
                        stockCount: 0,
                        description: ''
                    };
                    bookDialogVisible.value = true;
                };
                
                // 显示用户管理
                const showUserDialog = async () => {
                    userDialogVisible.value = true;
                    try {
                        const response = await fetch(`${API_BASE}/users`);
                        users.value = await response.json();
                    } catch (error) {
                        ElementPlus.ElMessage.error('加载用户失败');
                    }
                };
                
                // 显示借阅管理
                const showBorrowDialog = async () => {
                    borrowDialogVisible.value = true;
                    try {
                        const response = await fetch(`${API_BASE}/borrow-records`);
                        const data = await response.json();
                        // 添加用户名和书名
                        borrows.value = data;
                    } catch (error) {
                        ElementPlus.ElMessage.error('加载借阅记录失败');
                    }
                };
                
                // 编辑图书
                const editBook = (book) => {
                    isEdit.value = true;
                    bookForm.value = { ...book };
                    bookDialogVisible.value = true;
                };
                
                // 保存图书
                const saveBook = async () => {
                    if (!bookForm.value.title || !bookForm.value.author) {
                        ElementPlus.ElMessage.warning('请填写书名和作者');
                        return;
                    }
                    
                    try {
                        let response;
                        if (isEdit.value) {
                            response = await fetch(`${API_BASE}/books/${bookForm.value.id}`, {
                                method: 'PUT',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify(bookForm.value)
                            });
                        } else {
                            response = await fetch(`${API_BASE}/books`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify(bookForm.value)
                            });
                        }
                        
                        if (response.ok) {
                            ElementPlus.ElMessage.success(isEdit.value ? '更新成功' : '添加成功');
                            bookDialogVisible.value = false;
                            loadBooks();
                            loadStats();
                        } else {
                            ElementPlus.ElMessage.error('保存失败');
                        }
                    } catch (error) {
                        ElementPlus.ElMessage.error('保存失败：' + error.message);
                    }
                };
                
                // 删除图书
                const deleteBook = async (book) => {
                    try {
                        const response = await fetch(`${API_BASE}/books/${book.id}`, {
                            method: 'DELETE'
                        });
                        if (response.ok) {
                            ElementPlus.ElMessage.success('删除成功');
                            loadBooks();
                            loadStats();
                        } else {
                            ElementPlus.ElMessage.error('删除失败');
                        }
                    } catch (error) {
                        ElementPlus.ElMessage.error('删除失败：' + error.message);
                    }
                };
                
                // 加载统计数据
                const loadStats = async () => {
                    try {
                        const [booksRes, usersRes] = await Promise.all([
                            fetch(`${API_BASE}/books`),
                            fetch(`${API_BASE}/users`)
                        ]);
                        const booksData = await booksRes.json();
                        const usersData = await usersRes.json();
                        
                        stats.value = {
                            totalBooks: booksData.length,
                            availableBooks: booksData.filter(b => b.stockCount > 0).length,
                            totalUsers: usersData.length,
                            totalBorrows: 0
                        };
                    } catch (error) {
                        console.error('加载统计失败', error);
                    }
                };
                
                onMounted(() => {
                    loadBooks();
                    loadStats();
                });
                
                return {
                    books,
                    users,
                    borrows,
                    loading,
                    searchQuery,
                    bookDialogVisible,
                    userDialogVisible,
                    borrowDialogVisible,
                    isEdit,
                    stats,
                    bookForm,
                    loadBooks,
                    searchBooks,
                    showAddDialog,
                    showUserDialog,
                    showBorrowDialog,
                    editBook,
                    saveBook,
                    deleteBook
                };
            }
        }).use(ElementPlus).mount('#app');
    </script>
</body>
</html>
